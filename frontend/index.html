<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Devlens - AI-Powered Code Analyzer">
    <title>Devlens • Code Analyzer</title>
    <!-- Use Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient-start: #e0f2fe;
            --gradient-end: #0ea5e9;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-color: #0c4a6e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            position: relative;
            overflow: hidden;
        }

        /* Ambient animated blobs for background */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            border-radius: 50%;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(125, 211, 252, 0.6);
            top: -10%;
            left: -10%;
        }
        .blob-2 {
            width: 500px;
            height: 500px;
            background: rgba(2, 132, 199, 0.4);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.1); }
        }

        /* Core Glassmorphism Layout */
        .glass-panel {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin: 20px;
        }
        
        .glass-panel::-webkit-scrollbar {
            width: 8px;
        }
        
        .glass-panel::-webkit-scrollbar-thumb {
            background: rgba(2, 132, 199, 0.3);
            border-radius: 10px;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: -webkit-linear-gradient(45deg, #0284c7, #0c4a6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: #0f172a;
            resize: vertical;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus {
            background: rgba(255, 255, 255, 0.6);
            border-color: #0284c7;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.2);
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button.run-btn {
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.3);
        }

        button.run-btn:hover:not(:disabled) {
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.4);
        }

        /* Terminal Style */
        .terminal-container {
            display: none;
            flex-direction: column;
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
            margin-top: 24px;
            max-height: 400px;
            overflow-y: auto;
            position: relative;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            color: #94a3b8;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .terminal-body {
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: #38bdf8;
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .terminal-input-line {
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .terminal-input-line input {
            background: transparent;
            border: none;
            color: #38bdf8;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .glass-panel {
                padding: 24px;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-panel">
        <header>
            <h1>Devlens</h1>
            <p>AI-Powered Code Analyzer & Console</p>
        </header>

        <div class="input-group">
            <label for="codeInput">Paste your code below to instantly understand or run it:</label>
            <textarea id="codeInput" placeholder="name = input('Name: ')&#10;print(f'Hello {name}!')"></textarea>
        </div>

        <div class="button-group">
            <button id="analyzeBtn">
                <span>Analyze Code</span>
                <div class="spinner"></div>
            </button>
            <button id="runBtn" class="run-btn">
                <span>Run Code</span>
                <div class="spinner"></div>
            </button>
        </div>
        
        <div id="errorMsg" class="error-message"></div>

        <div class="result-container" id="resultContainer">
            <div class="result-card">
                <div class="result-title">Explanation</div>
                <div class="result-body" id="resExplanation">...</div>
            </div>
            
            <div class="result-card">
                <div class="result-title">Complexity</div>
                <div class="result-body" id="resComplexity">...</div>
            </div>

            <div class="result-card">
                <div class="result-title">Detected Issues</div>
                <div class="result-body" id="resIssues">...</div>
            </div>
        </div>

        <div class="terminal-container" id="terminalContainer">
            <div class="terminal-header">
                <span>Console Output (AI Simulated)</span>
                <span id="terminalStatus">Ready</span>
            </div>
            <div class="terminal-body" id="terminalOutput"></div>
            <div class="terminal-input-line" id="terminalInputArea">
                <span id="terminalPrompt">> </span>
                <input type="text" id="terminalInput" autofocus>
            </div>
        </div>
    </div>

    <script>
        let currentInputs = [];

        // Analyzer Logic
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            handleAction('analyze');
        });

        // Runner Logic
        document.getElementById('runBtn').addEventListener('click', async () => {
            currentInputs = [];
            document.getElementById('terminalOutput').textContent = '';
            handleAction('simulate');
        });

        async function handleAction(type) {
            const code = document.getElementById('codeInput').value;
            const btn = type === 'analyze' ? document.getElementById('analyzeBtn') : document.getElementById('runBtn');
            const btnText = btn.querySelector('span');
            const spinner = btn.querySelector('.spinner');
            const resultContainer = document.getElementById('resultContainer');
            const terminalContainer = document.getElementById('terminalContainer');
            const errorMsg = document.getElementById('errorMsg');
            
            if (!code.trim()) {
                errorMsg.textContent = "Please enter some code first.";
                errorMsg.style.display = "block";
                return;
            }

            errorMsg.style.display = "none";
            btn.disabled = true;
            spinner.style.display = "block";
            const originalText = btnText.textContent;
            btnText.textContent = type === 'analyze' ? "Analyzing..." : "Executing...";

            try {
                const endpoint = type === 'analyze' ? '/api/analyze' : '/api/simulate';
                const body = type === 'analyze' ? { code } : { code, inputs: currentInputs };

                const response = await fetch(`http://localhost:8000${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Request failed.');

                if (type === 'analyze') {
                    terminalContainer.style.display = "none";
                    document.getElementById('resExplanation').textContent = data.explanation;
                    document.getElementById('resComplexity').textContent = data.complexity;
                    document.getElementById('resIssues').textContent = data.issues;
                    resultContainer.style.display = "flex";
                } else {
                    resultContainer.style.display = "none";
                    terminalContainer.style.display = "flex";
                    updateTerminal(data);
                }

            } catch (err) {
                errorMsg.textContent = err.message === 'Failed to fetch' ? "Backend not reachable." : err.message;
                errorMsg.style.display = "block";
            } finally {
                btn.disabled = false;
                btnText.textContent = originalText;
                spinner.style.display = "none";
            }
        }

        function updateTerminal(data) {
            const output = document.getElementById('terminalOutput');
            const statusLabel = document.getElementById('terminalStatus');
            const inputArea = document.getElementById('terminalInputArea');
            const promptLabel = document.getElementById('terminalPrompt');
            const inputField = document.getElementById('terminalInput');

            output.textContent = data.output;
            
            if (data.status === 'waiting_for_input') {
                statusLabel.textContent = "Waiting for input...";
                promptLabel.textContent = data.prompt || "> ";
                inputArea.style.display = "flex";
                inputField.focus();
            } else {
                statusLabel.textContent = "Finished";
                inputArea.style.display = "none";
            }
            
            // Auto-scroll
            const container = document.getElementById('terminalContainer');
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('terminalInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value;
                currentInputs.push(val);
                e.target.value = '';
                document.getElementById('terminalInputArea').style.display = "none";
                handleAction('simulate');
            }
        });
    </script>
</body>
</html>

</body>
</html>
