<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Devlens - AI-Powered Code Analyzer">
    <title>Devlens • Code Analyzer</title>
    <!-- Use Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gradient-start: #e0f2fe;
            --gradient-end: #0ea5e9;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-color: #0c4a6e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            position: relative;
            overflow: hidden;
        }

        /* Ambient animated blobs for background */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            border-radius: 50%;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(125, 211, 252, 0.6);
            top: -10%;
            left: -10%;
        }
        .blob-2 {
            width: 500px;
            height: 500px;
            background: rgba(2, 132, 199, 0.4);
            bottom: -20%;
            right: -10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.1); }
        }

        /* Core Glassmorphism Layout */
        .glass-panel {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin: 20px;
        }
        
        .glass-panel::-webkit-scrollbar {
            width: 8px;
        }
        
        .glass-panel::-webkit-scrollbar-thumb {
            background: rgba(2, 132, 199, 0.3);
            border-radius: 10px;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: -webkit-linear-gradient(45deg, #0284c7, #0c4a6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.8;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: #0f172a;
            resize: vertical;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus {
            background: rgba(255, 255, 255, 0.6);
            border-color: #0284c7;
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.2);
        }

        button {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
            align-self: center;
            width: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(2, 132, 199, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.8;
        }

        /* Spinner for loading state */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-container {
            display: none;
            flex-direction: column;
            gap: 16px;
            margin-top: 16px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        
        .result-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.6);
        }

        .result-title {
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #0284c7;
        }

        .result-body {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #0f172a;
        }
        
        .error-message {
            color: #b91c1c;
            background: #fee2e2;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #fca5a5;
            display: none;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-out;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .glass-panel {
                padding: 24px;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-panel">
        <header>
            <h1>Devlens</h1>
            <p>AI-Powered Code Analyzer</p>
        </header>

        <div class="input-group">
            <label for="codeInput">Paste your code below to instantly understand it:</label>
            <textarea id="codeInput" placeholder="def find_max(arr):&#10;    max_val = arr[0]&#10;    for num in arr:&#10;        if num > max_val:&#10;            max_val = num&#10;    return max_val"></textarea>
        </div>

        <button id="analyzeBtn">
            <span>Analyze Code</span>
            <div class="spinner" id="spinner"></div>
        </button>
        
        <div id="errorMsg" class="error-message"></div>

        <div class="result-container" id="resultContainer">
            <div class="result-card">
                <div class="result-title">Explanation</div>
                <div class="result-body" id="resExplanation">...</div>
            </div>
            
            <div class="result-card">
                <div class="result-title">Complexity</div>
                <div class="result-body" id="resComplexity">...</div>
            </div>

            <div class="result-card">
                <div class="result-title">Detected Issues</div>
                <div class="result-body" id="resIssues">...</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const code = document.getElementById('codeInput').value;
            const btn = document.getElementById('analyzeBtn');
            const btnText = btn.querySelector('span');
            const spinner = document.getElementById('spinner');
            const resultContainer = document.getElementById('resultContainer');
            const errorMsg = document.getElementById('errorMsg');
            
            // Check empty input
            if (!code.trim()) {
                errorMsg.textContent = "Please enter some code to analyze.";
                errorMsg.style.display = "block";
                return;
            }

            // Reset UI states
            errorMsg.style.display = "none";
            resultContainer.style.display = "none";
            btn.disabled = true;
            btnText.textContent = "Analyzing...";
            spinner.style.display = "block";

            try {
                // Connect to local Flask Backend
                const response = await fetch('http://localhost:8000/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ code: code })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to analyze code.');
                }

                // Handle Output
                document.getElementById('resExplanation').textContent = data.explanation || "No explanation provided.";
                document.getElementById('resComplexity').textContent = data.complexity || "Unknown complexity.";
                document.getElementById('resIssues').textContent = data.issues || "None detected.";
                
                resultContainer.style.display = "flex";

            } catch (err) {
                // If backend is not started or CORS error
                if(err.message === 'Failed to fetch') {
                    errorMsg.textContent = "Cannot connect to backend. Please ensure the Python Flask server is running on localhost:8000.";
                } else {
                    errorMsg.textContent = err.message;
                }
                errorMsg.style.display = "block";
            } finally {
                // Stop Loading
                btn.disabled = false;
                btnText.textContent = "Analyze Code";
                spinner.style.display = "none";
            }
        });
    </script>
</body>
</html>
